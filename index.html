<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法大王眼中的少女薇拉 — 各大模型对比</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c8a96e;
    --gold-bright: #f0cc85;
    --bg-dark: #07111f;
    --transition-speed: 0.7s;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Noto Serif SC', 'Noto Sans SC', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  }

  /* ── Outer stage ── */
  #stage {
    width: 100%;
    height: 100vh;
    position: relative;
    overflow: hidden;
  }

  /* ── Section container (slides vertically) ── */
  #sections-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    transition: transform var(--transition-speed) cubic-bezier(0.76, 0, 0.24, 1);
  }

  .section {
    width: 100%;
    height: 100vh;
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
  }

  /* ──────────────────────────────
     SECTION 1 — HERO
  ────────────────────────────── */
  #sec1 {
    background: var(--bg-dark);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Starfield canvas */
  #starCanvas {
    position: absolute; inset: 0;
    pointer-events: none;
  }

  .hero-inner {
    position: relative;
    z-index: 1;
    text-align: center;
    color: #fff;
    padding: 2rem;
    max-width: 1000px;
  }

  .hero-label {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(200,169,110,0.7);
    margin-bottom: 1.5rem;
  }

  .hero-title {
    font-size: clamp(2.4rem, 6vw, 5rem);
    font-weight: 700;
    line-height: 1.1;
    color: var(--gold-bright);
    text-shadow: 0 0 60px rgba(200,169,110,0.4);
    margin-bottom: 1.25rem;
    letter-spacing: 0.05em;
  }

  .hero-subtitle {
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    color: rgba(255,255,255,0.6);
    line-height: 1.6;
    margin-bottom: 2.5rem;
  }

  .hero-scroll-hint {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    color: rgba(255,255,255,0.3);
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    animation: fadeUpDown 2s ease-in-out infinite;
  }

  .hero-scroll-hint svg {
    width: 20px; height: 20px;
    stroke: rgba(200,169,110,0.5);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
  }

  @keyframes fadeUpDown {
    0%, 100% { opacity: 0.4; transform: translateY(0); }
    50%       { opacity: 1;   transform: translateY(6px); }
  }

  /* Decorative orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    animation: floatOrb var(--dur, 12s) ease-in-out infinite;
  }
  .orb1 { width: 360px; height: 360px; background: rgba(100, 80, 200, 0.18); top: -60px; left: -80px; --dur: 14s; }
  .orb2 { width: 280px; height: 280px; background: rgba(200,169,110,0.12); top: 40%; right: -60px; --dur: 11s; }
  .orb3 { width: 220px; height: 220px; background: rgba(88,202,255,0.10); bottom: -40px; left: 30%; --dur: 16s; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0, 0); }
    33%       { transform: translate(20px, -25px); }
    66%       { transform: translate(-15px, 15px); }
  }

  /* ──────────────────────────────
     SECTION 2 & 3 — COMPARISON
  ────────────────────────────── */
  #sec2, #sec3 {
    background: #0a0a18;
    display: flex;
    flex-direction: column;
  }

  .sec2-header {
    height: 48px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(10,10,24,0.95);
    border-bottom: 1px solid rgba(200,169,110,0.15);
    gap: 1.5rem;
    padding: 0 1rem;
  }

  .sec2-header-title {
    font-size: 0.8rem;
    color: rgba(200,169,110,0.8);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* Three-panel layout */
  .panels {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  .panel {
    flex: 1;
    position: relative;
    border-right: 1px solid rgba(255,255,255,0.06);
    transition: flex 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
  }
  .panel:last-child { border-right: none; }

  /* panel header bar */
  .panel-bar {
    height: 36px;
    background: rgba(5,5,20,0.9);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
  }

  .panel-label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }

  .panel-label .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 7px;
  }
  #panel-chatgpt .dot, #panel-qwen-chatgpt .dot { background: #10a37f; }
  #panel-claude  .dot, #panel-qwen-claude  .dot { background: #cc785c; }
  #panel-gemini  .dot, #panel-qwen-gemini  .dot { background: #4285f4; }

  /* Fullscreen button */
  .fs-btn {
    position: absolute;
    top: 6px; right: 10px;
    z-index: 20;
    width: 26px; height: 26px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    padding: 0;
  }
  .fs-btn:hover {
    background: rgba(200,169,110,0.15);
    color: var(--gold-bright);
    border-color: rgba(200,169,110,0.4);
  }
  .fs-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

  /* iframes */
  .panel-iframe-wrap {
    position: absolute;
    top: 36px; left: 0; right: 0; bottom: 0;
    overflow: hidden;
  }

  .panel iframe {
    width: 100%; height: 100%;
    border: none;
    display: block;
  }

  /* Fullscreen state: expand one panel, hide others */
  .panels.fullscreen .panel { flex: 0; overflow: hidden; }
  .panels.fullscreen .panel.active-fs { flex: 1; }

  /* Fullscreen nav arrows */
  .fs-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 30;
    width: 80px; height: 80px;
    border: 1px solid rgba(200,169,110,0.25);
    border-radius: 50%;
    background: rgba(5,5,20,0.6);
    color: rgba(200,169,110,0.7);
    cursor: pointer;
    display: none;            /* hidden unless fullscreen */
    align-items: center; justify-content: center;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    padding: 0;
  }
  .fs-nav:hover {
    background: rgba(200,169,110,0.15);
    color: var(--gold-bright);
    border-color: rgba(200,169,110,0.5);
  }
  .fs-nav svg { width: 36px; height: 36px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .fs-nav-prev { left: 56px; }
  .fs-nav-next { right: 56px; }
  .panels.fullscreen .fs-nav { display: flex; }

  /* ── Scroll‐transition overlay (blocks accidental clicks during anim) ── */
  #overlay {
    position: fixed; inset: 0; z-index: 9999;
    pointer-events: none;
  }

  /* ── Section indicator dots ── */
  #nav-dots {
    position: fixed;
    right: 22px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 100;
  }

  .nav-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1.5px solid rgba(200,169,110,0.4);
    background: transparent;
    cursor: pointer;
    transition: background 0.3s, border-color 0.3s, transform 0.3s;
  }
  .nav-dot.active {
    background: var(--gold);
    border-color: var(--gold);
    transform: scale(1.3);
  }
</style>

<script>
// ════════════════════════════════════════════════
//  State
// ════════════════════════════════════════════════
const SECTIONS      = 3;          // total number of sections
let currentSection  = 0;
let isAnimating     = false;
const ANIM_DURATION = 700;        // ms, matches CSS transition

const wrap   = document.getElementById('sections-wrap');
const dots   = document.querySelectorAll('.nav-dot');

// Lock outer page scroll — iframe hash jumps must not shift the parent
window.addEventListener('scroll', () => window.scrollTo(0, 0));

// ─── Starfield ─────────────────────────────────
(function initStars() {
  const canvas = document.getElementById('starCanvas');
  const ctx    = canvas.getContext('2d');
  let stars    = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    createStars();
  }

  function createStars() {
    stars = [];
    const count = Math.floor((canvas.width * canvas.height) / 4000);
    for (let i = 0; i < count; i++) {
      stars.push({
        x:  Math.random() * canvas.width,
        y:  Math.random() * canvas.height,
        r:  Math.random() * 1.4 + 0.2,
        a:  Math.random(),
        da: (Math.random() * 0.004 + 0.001) * (Math.random() < 0.5 ? 1 : -1),
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      s.a += s.da;
      if (s.a <= 0 || s.a >= 1) s.da *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,245,220,${s.a})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  draw();
})();

// ─── Section navigation ────────────────────────
function goToSection(idx) {
  if (isAnimating || idx === currentSection) return;
  if (idx < 0 || idx >= SECTIONS) return;

  isAnimating = true;
  currentSection = idx;
  wrap.style.transform = `translateY(-${idx * 100}vh)`;
  updateDots();

  setTimeout(() => { isAnimating = false; }, ANIM_DURATION);
}

function updateDots() {
  dots.forEach((d, i) => d.classList.toggle('active', i === currentSection));
}

dots.forEach(d => {
  d.addEventListener('click', () => goToSection(+d.dataset.target));
});

// ─── iframes ───────────────────────────────────
const iframeIds  = ['iframe-chatgpt', 'iframe-claude', 'iframe-gemini', 'iframe-qwen-chatgpt', 'iframe-qwen-claude', 'iframe-qwen-gemini'];
const iframeEls  = iframeIds.map(id => document.getElementById(id));

const HIDE_SCROLLBAR_CSS = `
  ::-webkit-scrollbar { display: none !important; }
  * { scrollbar-width: none !important; }
`;

function injectHideScrollbar(iframe) {
  try {
    const doc = iframe.contentDocument;
    if (!doc) return;
    const style = doc.createElement('style');
    style.textContent = HIDE_SCROLLBAR_CSS;
    (doc.head || doc.documentElement).appendChild(style);
  } catch(e) {}
}

function getIframeScrollInfo(iframe) {
  try {
    const win = iframe.contentWindow;
    const doc = iframe.contentDocument || win.document;
    const scrollY   = win.scrollY || doc.documentElement.scrollTop || 0;
    const maxScroll = Math.max(0,
      doc.documentElement.scrollHeight - (win.innerHeight || doc.documentElement.clientHeight));
    return { scrollY, maxScroll };
  } catch(e) { return { scrollY: 0, maxScroll: 0 }; }
}

// ─── Wheel handler (page-level) ────────────────
window.addEventListener('wheel', function(e) {
  if (isAnimating) return;

  const delta = e.deltaY || e.detail || 0;

  if (currentSection === 0) {
    if (delta > 0) { e.preventDefault(); goToSection(1); }
    return;
  }
}, { passive: false });

// ─── Iframe wheel interception ─────────────────
// Each iframe scrolls independently. When an iframe hits its scroll
// boundary and the user keeps scrolling, we transition sections.
function attachIframeListeners(iframe) {
  try {
    iframe.contentWindow.addEventListener('wheel', function(e) {
      if (isAnimating) return;

      const delta = e.deltaY || 0;
      if (delta === 0) return;

      const { scrollY, maxScroll } = getIframeScrollInfo(iframe);

      if (delta > 0 && maxScroll > 0 && scrollY >= maxScroll - 8) {
        // At bottom, continuing to scroll down → next section
        e.preventDefault();
        if (currentSection < SECTIONS - 1) goToSection(currentSection + 1);
      } else if (delta < 0 && scrollY <= 4) {
        // At top, continuing to scroll up → previous section
        e.preventDefault();
        goToSection(currentSection - 1);
      }
      // Otherwise: let the iframe scroll naturally (no preventDefault)
    }, { passive: false });
  } catch(err) {}
}

// Intercept anchor clicks inside iframes — prevent default hash nav that
// shifts the parent page, and scroll to target within the iframe instead.
function interceptAnchorClicks(iframe) {
  try {
    const doc = iframe.contentDocument;
    const win = iframe.contentWindow;
    if (!doc || !win) return;
    doc.addEventListener('click', function(e) {
      const link = e.target.closest('a[href^="#"]');
      if (!link) return;
      e.preventDefault();
      const id = link.getAttribute('href').slice(1);
      if (!id) return;
      const target = doc.getElementById(id);
      if (!target) return;
      // Use iframe's own scrollTo — scrollIntoView also scrolls ancestor docs
      const y = target.getBoundingClientRect().top + win.scrollY;
      win.scrollTo({ top: y, behavior: 'smooth' });
    });
  } catch(err) {}
}

iframeEls.forEach(iframe => {
  iframe.addEventListener('load', () => {
    injectHideScrollbar(iframe);
    attachIframeListeners(iframe);
    interceptAnchorClicks(iframe);
  });
});

// ─── Panel order & fullscreen helpers ───────────
function getPanelsInContainer(container) {
  return Array.from(container.querySelectorAll('.panel')).map(p => p.id);
}

function switchFullscreenPanel(targetId) {
  if (!activeFsPanel || !targetId) return;
  const targetEl = document.getElementById(targetId);
  if (!targetEl) return;
  
  const container = targetEl.closest('.panels');

  container.querySelectorAll('.panel').forEach(p => p.classList.remove('active-fs'));
  targetEl.classList.add('active-fs');
  activeFsPanel = targetId;

  document.querySelectorAll('.fs-btn').forEach(btn => {
    btn.querySelector('svg').innerHTML =
      btn.dataset.panel === targetId ? collapseIcon : expandIcon;
  });

  updateFsNav(container);
}

function updateFsNav(container) {
  if (!container) return;
  const panelsOrder = getPanelsInContainer(container);
  const idx = panelsOrder.indexOf(activeFsPanel);
  
  const prevBtn = container.querySelector('.fs-nav-prev');
  const nextBtn = container.querySelector('.fs-nav-next');
  
  if (prevBtn) prevBtn.style.visibility = (activeFsPanel && idx > 0) ? 'visible' : 'hidden';
  if (nextBtn) nextBtn.style.visibility = (activeFsPanel && idx < panelsOrder.length - 1) ? 'visible' : 'hidden';
}

// ─── Keyboard navigation ───────────────────────
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown' || e.key === 'PageDown') {
    e.preventDefault();
    if (currentSection < SECTIONS - 1) goToSection(currentSection + 1);
  }
  if (e.key === 'ArrowUp' || e.key === 'PageUp') {
    e.preventDefault();
    if (currentSection > 0) goToSection(currentSection - 1);
  }
  // Left/Right arrows switch fullscreen panel
  if (e.key === 'ArrowLeft' && activeFsPanel) {
    e.preventDefault();
    const panelEl = document.getElementById(activeFsPanel);
    const container = panelEl.closest('.panels');
    const panelsOrder = getPanelsInContainer(container);
    const idx = panelsOrder.indexOf(activeFsPanel);
    if (idx > 0) switchFullscreenPanel(panelsOrder[idx - 1]);
  }
  if (e.key === 'ArrowRight' && activeFsPanel) {
    e.preventDefault();
    const panelEl = document.getElementById(activeFsPanel);
    const container = panelEl.closest('.panels');
    const panelsOrder = getPanelsInContainer(container);
    const idx = panelsOrder.indexOf(activeFsPanel);
    if (idx < panelsOrder.length - 1) switchFullscreenPanel(panelsOrder[idx + 1]);
  }
});

// ─── Fullscreen panel toggle ───────────────────
let activeFsPanel = null;

// Icons
const expandIcon = `<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>`;
const collapseIcon = `<polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/>`;

document.querySelectorAll('.fs-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const panelId = btn.dataset.panel;
    const panelEl = document.getElementById(panelId);
    const container = panelEl.closest('.panels');

    if (activeFsPanel === panelId) {
      // Exit fullscreen
      container.classList.remove('fullscreen');
      container.querySelectorAll('.panel').forEach(p => p.classList.remove('active-fs'));
      document.querySelectorAll('.fs-btn svg').forEach(svg => { svg.innerHTML = expandIcon; });
      activeFsPanel = null;
      
      const prevBtn = container.querySelector('.fs-nav-prev');
      const nextBtn = container.querySelector('.fs-nav-next');
      if (prevBtn) prevBtn.style.visibility = 'hidden';
      if (nextBtn) nextBtn.style.visibility = 'hidden';
    } else {
      // Clear any other fullscreen container
      document.querySelectorAll('.panels').forEach(p => p.classList.remove('fullscreen'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-fs'));

      // Enter fullscreen for this panel
      container.classList.add('fullscreen');
      panelEl.classList.add('active-fs');
      activeFsPanel = panelId;
      // Update icons
      document.querySelectorAll('.fs-btn svg').forEach(svg => { svg.innerHTML = expandIcon; });
      btn.querySelector('svg').innerHTML = collapseIcon;
      updateFsNav(container);
    }
  });
});

// ─── Fullscreen panel switching (arrows) ────────
document.querySelectorAll('.fs-nav-prev').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const container = btn.closest('.panels');
    const panelsOrder = getPanelsInContainer(container);
    const idx = panelsOrder.indexOf(activeFsPanel);
    if (idx <= 0) return;
    switchFullscreenPanel(panelsOrder[idx - 1]);
  });
});

document.querySelectorAll('.fs-nav-next').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const container = btn.closest('.panels');
    const panelsOrder = getPanelsInContainer(container);
    const idx = panelsOrder.indexOf(activeFsPanel);
    if (idx < 0 || idx >= panelsOrder.length - 1) return;
    switchFullscreenPanel(panelsOrder[idx + 1]);
  });
});

// ─── Touch / swipe support ─────────────────────
let touchStartY = 0;
window.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
window.addEventListener('touchmove', e => {
  if (isAnimating) return;
  const dy = touchStartY - e.touches[0].clientY;
  if (Math.abs(dy) < 8) return;
  touchStartY = e.touches[0].clientY;
  if (currentSection < SECTIONS - 1 && dy > 0) goToSection(currentSection + 1);
  else if (currentSection > 0 && dy < 0) goToSection(currentSection - 1);
}, { passive: true });
</script>
</body>
